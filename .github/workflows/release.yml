name: release

# --- Why this workflow exists -----------------------------------------
#
# This workflow creates the GitHub-side artifacts of a release: a git
# tag and a matching GitHub Release whose body is the extracted section
# of `CHANGELOG.md`. It does NOT publish to the npm registry. The
# Creator's binding directive: the release artifact on GitHub MUST be
# reviewable before it propagates to NPMJS, because once a package
# version is on the npm registry it cannot be unpublished after 72 hours.
#
# The two-step release flow is therefore:
#
#   Step 1 (this workflow `release.yml`):
#     - Validate package + version + tag absence + CHANGELOG entry.
#     - Lint + typecheck + test + build the package.
#     - Run the documentation link gate (scripts/check-links.mjs).
#     - Pack dry-run as a final sanity check of the published artifact.
#     - Create the git tag `v<version>`.
#     - Create the GitHub Release with the title prefixed
#       `[REVIEW REQUIRED: NOT YET ON NPMJS]` and the body extracted
#       from `CHANGELOG.md` behind the matching status banner.
#     - Do NOT publish to npm.
#
#   Step 2 (`npm-publish.yml`):
#     - Verify the tag + GitHub Release from Step 1 exist.
#     - Verify monotonic version vs the npm registry (no backwards or
#       duplicate publishes), dependency-free semver compare.
#     - Build + pack dry-run + publish to npm with provenance.
#     - Update the GitHub Release title to `[PUBLISHED ON NPMJS]` so
#       the two-step state is visible.
#
# The Creator runs Step 1 immediately after a release-worthy change is
# pushed to main; reviews the resulting GitHub Release page (which
# carries the changelog, the tag, the commit, and any attached assets);
# and only then runs Step 2 to push the artifact to NPMJS.
#
# This is INTENTIONALLY non-atomic. The cost is one extra Creator
# action; the benefit is the freedom to discover a flaw in the release
# notes or the build output before the version becomes permanent on the
# npm registry.

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Exact semver. MUST match package.json. Examples: 1.0.0, 1.0.1, 1.1.0-rc.1."
        required: true
        type: string
      confirm:
        description: 'Type exactly: "YES-CREATE-GITHUB-RELEASE"'
        required: true
        type: string

permissions:
  contents: write # required to create the git tag + GitHub Release
  # `id-token` is intentionally omitted here. npm provenance (which needs
  # `id-token: write`) happens in npm-publish.yml, not in this workflow.

# Serialise per version so two concurrent invocations on the same
# version cannot race on tag creation / release creation.
concurrency:
  group: release-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  release:
    name: release (tag + GitHub Release) @takk/racs@${{ inputs.version }}
    runs-on: ubuntu-latest

    steps:
      - name: Reject if confirmation phrase is wrong
        run: |
          expected="YES-CREATE-GITHUB-RELEASE"
          if [ "${{ inputs.confirm }}" != "$expected" ]; then
            echo "::error::Confirmation phrase mismatch. Re-run with confirm=\"$expected\"."
            exit 1
          fi

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # full history for changelog extraction + tag-existence checks

      - name: Validate version matches package.json
        run: |
          declared=$(node -p "require('./package.json').version")
          if [ "$declared" != "${{ inputs.version }}" ]; then
            echo "::error::Input version ${{ inputs.version }} does not match package.json version $declared."
            echo "::error::Edit package.json to ${{ inputs.version }} and commit, OR re-run with the correct version."
            exit 1
          fi

      - name: Validate git tag does not already exist
        run: |
          tag="v${{ inputs.version }}"
          if git rev-parse --verify "refs/tags/$tag" >/dev/null 2>&1; then
            echo "::error::Tag $tag already exists locally. Pull latest main and confirm you are not duplicating a prior release."
            exit 1
          fi
          if git ls-remote --tags origin "refs/tags/$tag" | grep -q "$tag"; then
            echo "::error::Tag $tag already exists on origin. This version has been released before."
            exit 1
          fi

      - name: Validate CHANGELOG.md has an entry for this version
        run: |
          file="CHANGELOG.md"
          version="${{ inputs.version }}"
          if [ ! -f "$file" ]; then
            echo "::error::CHANGELOG.md not found at $file"
            exit 1
          fi
          if ! grep -qF "$version" "$file"; then
            echo "::error::CHANGELOG.md at $file does not mention version $version."
            echo "::error::Add a section for $version (Keep-a-Changelog format) and commit before re-running."
            exit 1
          fi

      - name: Set up pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node 22
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Documentation link gate
        run: |
          # Blocking gate before any tag exists: every relative link target
          # must exist on disk, externals are probed (bot-gated hosts
          # tolerated, the package's own npm page skipped pre-publish, the
          # pending racs.takk.ag DNS warns instead of failing until the
          # record resolves). See scripts/check-links.mjs for the policy.
          node scripts/check-links.mjs

      - name: Validate package metadata
        run: pnpm publint

      - name: Pack dry-run (sanity check the artifact shape that would ship to npm)
        run: pnpm pack --pack-destination /tmp

      - name: Configure git for tag creation
        run: |
          git config user.name "racs Release Bot"
          git config user.email "noreply@takk.ag"

      - name: Create and push git tag
        run: |
          tag="v${{ inputs.version }}"
          git tag -a "$tag" -m "@takk/racs@${{ inputs.version }} (GitHub release, not yet on NPMJS)"
          git push origin "$tag"

      - name: Extract changelog section for this release
        id: changelog
        run: |
          file="CHANGELOG.md"
          version="${{ inputs.version }}"
          body=$(awk -v v="$version" '
            BEGIN { in_section = 0 }
            /^## / {
              if (in_section) { exit }
              if (index($0, v) > 0) { in_section = 1; print; next }
            }
            in_section { print }
          ' "$file" || true)
          if [ -z "$body" ]; then
            body="Release of @takk/racs@${{ inputs.version }} (GitHub-side only; not yet on NPMJS). See [CHANGELOG.md](${file}) for details."
          fi
          # Prefix the body with the review-required banner so the release
          # page makes the state obvious at first glance. The banner text is
          # a contract: npm-publish.yml strips exactly this line (literal
          # escaped period) when it flips the release to published.
          {
            printf '%s\n\n' "> **STATUS: REVIEW REQUIRED, NOT YET ON NPMJS.** This GitHub Release was created by the \`release.yml\` workflow. The Creator must review the contents (tag, changelog, attached commit, pack-smoke and link-check results in the workflow logs) and then explicitly run \`npm-publish.yml\` to publish this version to the npm registry."
            printf '%s\n' "$body"
          } > /tmp/release-body.md
          echo "body_file=/tmp/release-body.md" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release (review-required)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="v${{ inputs.version }}"
          if gh release view "$tag" >/dev/null 2>&1; then
            echo "Release $tag already exists; skipping creation."
            exit 0
          fi
          gh release create "$tag" \
            --title "[REVIEW REQUIRED: NOT YET ON NPMJS] @takk/racs@${{ inputs.version }}" \
            --notes-file "${{ steps.changelog.outputs.body_file }}" \
            --verify-tag

      - name: Summary
        run: |
          echo "-------------------------------------------------"
          echo "  Step 1 of 2 completed: GitHub Release created."
          echo "    Package          : @takk/racs"
          echo "    Version          : ${{ inputs.version }}"
          echo "    Git tag (pushed) : v${{ inputs.version }}"
          echo "    GitHub Release   : https://github.com/${{ github.repository }}/releases/tag/v${{ inputs.version }}"
          echo "    Status           : REVIEW REQUIRED, not yet on NPMJS"
          echo ""
          echo "  Next step (Creator-triggered after review):"
          echo "    gh workflow run npm-publish.yml \\"
          echo "      -f version=${{ inputs.version }} \\"
          echo "      -f confirm=I-AM-THE-CREATOR-AND-I-PUBLISH-TO-NPMJS"
          echo "-------------------------------------------------"
