name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ["22", "24"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node ${{ matrix.node }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Test (with coverage)
        run: pnpm test:coverage

      - name: Build
        run: pnpm build

      - name: Smoke the built artifacts
        run: pnpm smoke:dist

      - name: Validate package metadata
        run: pnpm publint

      - name: Validate published types
        run: pnpm attw
        continue-on-error: true

      - name: Pack (smoke)
        run: pnpm pack --pack-destination /tmp

      - name: CLI smoke (help banner is a contract)
        run: |
          # The first line of `racs help` is a tested CI contract: exactly
          # `racs 1.0.0`. RACS plans cache directives offline, so this smoke
          # touches no provider and needs no credentials. Catches missing-file,
          # broken-shebang, and version-constant drift before `npx @takk/racs`
          # reaches consumers.
          node dist/cli/index.js help | head -n 1 | grep -qx "racs 1.0.0"
          node dist/cli/index.js version | grep -qx "1.0.0"

      - name: Upload coverage (Node 22 only)
        if: matrix.node == '22'
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage/
